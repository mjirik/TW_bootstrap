<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Hello bez Bootstrapu</title>

    <style>
        /* Základní reset + font */
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 
                         "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
        }

        /* Náhrada za .container */
        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Náhrada za mt-5 */
        .mt-5 {
            margin-top: 3rem;
        }

        /* Náhrada za text-primary */
        .text-primary {
            color: #0d6efd;
        }

        /* Náhrada za text-muted */
        .text-muted {
            color: #6c757d;
        }

        /* Náhrada za btn btn-success */
        .btn {
            display: inline-block;
            padding: 0.5rem 1rem;
            font-size: 1rem;
            border-radius: 0.375rem;
            border: none;
            cursor: pointer;
        }

        .btn-success {
            background-color: #198754;
            color: white;
        }

        .btn-success:hover {
            background-color: #157347;
        }
    </style>
</head>
<body>

<div class="container mt-5">
    <h1 class="text-primary">Hello bez Bootstrapu 👋</h1>

    <p class="text-muted">
        Toto je moje první stránka bez Bootstrapu.
    </p>

    <button class="btn btn-success">
        Klikni na mě
    </button>
</div>

</body>
</html>
